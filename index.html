<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZYNQ7020 Smart Controller</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-card: #f5f5f7;
      --text: #1d1d1f;
      --text-secondary: #6e6e73;
      --accent: #0071e3;
      --border: #d2d2d7;
    }
    [data-theme="dark"] {
      --bg: #000000;
      --bg-card: #1c1c1e;
      --text: #f5f5f7;
      --text-secondary: #86868b;
      --accent: #2997ff;
      --border: #38383a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    .card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 28px;
      border: 1px solid var(--border);
      transition: all 0.3s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-on { background: #30d158; color: white; }
    .btn-off { background: #ff453a; color: white; }
    .btn-primary { background: var(--accent); color: white; padding: 14px 28px; font-size: 16px; }
    .btn-danger { background: #ff453a; color: white; padding: 14px 28px; font-size: 16px; }
    .dot {
      width: 48px; height: 48px; border-radius: 50%;
      margin: 0 auto 12px; border: 2px solid var(--border);
      transition: all 0.3s;
    }
    .dot.on { box-shadow: 0 0 20px currentColor; }
    .theme-toggle {
      position: fixed; top: 20px; right: 20px;
      width: 44px; height: 44px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--bg-card);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 20px; transition: all 0.3s; z-index: 100;
    }
    .theme-toggle:hover { transform: scale(1.1); }
    .led-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 16px; }
    .note-btn {
      background: var(--bg-card); color: var(--text);
      border: 1px solid var(--border); padding: 12px 20px;
      border-radius: 12px; min-width: 60px;
    }
    .error-box {
      background: rgba(255,69,58,0.1); border: 1px solid rgba(255,69,58,0.3);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 24px;
      color: #ff453a; font-size: 14px;
    }
    .status-bar { text-align: center; font-size: 14px; margin-bottom: 40px; }
    .playing { margin-top: 12px; color: #30d158; font-size: 14px; font-weight: 500; }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">☀️</button>

  <div class="container">
    <h1 style="text-align:center; font-size:36px; font-weight:700; margin-bottom:8px">ZYNQ7020</h1>
    <p style="text-align:center; color:var(--text-secondary); margin-bottom:8px; font-size:18px">Smart Controller</p>

    <p id="conn-status" class="status-bar" style="color:var(--text-secondary)">Checking...</p>

    <div id="error-box" class="error-box" style="display:none"></div>

    <!-- LED Control -->
    <div class="card" style="margin-bottom:24px">
      <h2 style="font-size:22px; font-weight:600; margin-bottom:20px">LED Control</h2>
      <div id="led-grid" class="led-grid"></div>
    </div>

    <!-- Buzzer -->
    <div class="card" style="margin-bottom:24px">
      <h2 style="font-size:22px; font-weight:600; margin-bottom:20px">Buzzer</h2>
      <div id="note-buttons" style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px"></div>
      <div style="display:flex; gap:12px">
        <button id="btn-play" class="btn btn-primary" onclick="playSong()">▶ Play Music</button>
        <button id="btn-stop" class="btn btn-danger" onclick="stopSong()">■ Stop</button>
      </div>
      <p id="playing-status" class="playing" style="display:none">● Playing...</p>
    </div>
  </div>

  <script>
    const BOARD = '';

    const LEDS = [
      { name: 'usr_led1', label: 'LED1', color: '#30d158' },
      { name: 'usr_led2', label: 'LED2', color: '#30d158' },
      { name: 'led_r', label: 'Green', color: '#30d158' },
      { name: 'led_g', label: 'Blue', color: '#0a84ff' },
      { name: 'led_b', label: 'Red', color: '#ff453a' },
    ];

    const NOTES = [
      { freq: 262, label: 'C4' },
      { freq: 294, label: 'D4' },
      { freq: 330, label: 'E4' },
      { freq: 349, label: 'F4' },
      { freq: 392, label: 'G4' },
      { freq: 440, label: 'A4' },
      { freq: 494, label: 'B4' },
      { freq: 523, label: 'C5' },
      { freq: 880, label: 'A5' },
    ];

    let connected = null;
    let busy = '';
    let playing = false;
    let ledStates = {};
    let healthTimer = null;

    // --- API helpers ---

    async function api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(BOARD + path, opts);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'HTTP ' + res.status);
      return data;
    }

    function showError(msg) {
      const el = document.getElementById('error-box');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    // --- Health check ---

    async function checkHealth() {
      try {
        await api('GET', '/health');
        connected = true;
        showError('');
      } catch (e) {
        connected = false;
        showError(e.message || 'Board is unavailable');
      }
      renderStatus();
    }

    function renderStatus() {
      const el = document.getElementById('conn-status');
      if (connected === null) {
        el.textContent = 'Checking...';
        el.style.color = 'var(--text-secondary)';
      } else if (connected) {
        el.textContent = '● Connected';
        el.style.color = '#30d158';
      } else {
        el.textContent = '● Disconnected';
        el.style.color = '#ff453a';
      }
    }

    // --- Theme ---

    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      document.querySelector('.theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
    }

    // --- LED ---

    async function setLed(name, value) {
      const oldValue = ledStates[name];
      ledStates[name] = (value === 1);
      busy = 'led:' + name;
      showError('');
      renderLEDs();

      try {
        await api('POST', '/led', { name, value });
      } catch (e) {
        ledStates[name] = oldValue;
        showError(e.message || 'LED operation failed');
      } finally {
        busy = '';
        renderLEDs();
      }
    }

    function renderLEDs() {
      const grid = document.getElementById('led-grid');
      grid.innerHTML = LEDS.map(led => {
        const on = ledStates[led.name];
        const bg = on ? led.color : 'var(--border)';
        const disabled = busy ? 'disabled' : '';
        return '<div class="card" style="text-align:center; padding:20px">' +
          '<div style="font-size:14px; font-weight:500; margin-bottom:12px">' + led.label + '</div>' +
          '<div class="dot' + (on ? ' on' : '') + '" style="background:' + bg + '; color:' + led.color + '"></div>' +
          '<div style="display:flex; gap:8px; justify-content:center">' +
          '<button class="btn btn-on" ' + disabled + ' onclick="setLed(\'' + led.name + '\',1)">ON</button>' +
          '<button class="btn btn-off" ' + disabled + ' onclick="setLed(\'' + led.name + '\',0)">OFF</button>' +
          '</div></div>';
      }).join('');
    }

    // --- Buzzer ---

    async function playNote(freq) {
      busy = 'note';
      showError('');
      try {
        await api('POST', '/buzzer', { freq, duration: 300 });
      } catch (e) {
        showError(e.message || 'Buzzer request failed');
      } finally {
        busy = '';
        renderNoteButtons();
      }
    }

    function renderNoteButtons() {
      const el = document.getElementById('note-buttons');
      el.innerHTML = NOTES.map(n =>
        '<button class="btn note-btn" ' + (busy ? 'disabled' : '') +
        ' onclick="playNote(' + n.freq + ')">' + n.label + '</button>'
      ).join('');
    }

    // --- Play / Stop ---

    async function playSong() {
      busy = 'song';
      playing = true;
      showError('');
      document.getElementById('btn-play').disabled = true;
      document.getElementById('btn-stop').disabled = false;
      document.getElementById('playing-status').style.display = 'block';

      try {
        await api('POST', '/play_song');
      } catch (e) {
        playing = false;
        showError(e.message || 'Play request failed');
        document.getElementById('playing-status').style.display = 'none';
      } finally {
        busy = '';
        renderNoteButtons();
      }
    }

    async function stopSong() {
      busy = 'stop';
      showError('');
      try {
        await api('POST', '/stop_song');
        playing = false;
        document.getElementById('playing-status').style.display = 'none';
      } catch (e) {
        showError(e.message || 'Stop request failed');
      } finally {
        busy = '';
        document.getElementById('btn-play').disabled = false;
        renderNoteButtons();
      }
    }

    // --- Init ---

    renderLEDs();
    renderNoteButtons();
    checkHealth();
    healthTimer = setInterval(checkHealth, 5000);
  </script>
</body>
</html>
